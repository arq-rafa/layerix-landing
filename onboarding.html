<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bienvenido a Layerix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#e6edf3;}
#bar{display:flex;gap:5px;padding:16px 20px 0;flex-shrink:0;}
.seg{height:3px;flex:1;border-radius:2px;background:#1e2736;transition:background .3s;}
.seg.on{background:#38d9ff;}
.seg.past{background:rgba(56,217,255,.35);}
#body{flex:1;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;display:flex;opacity:0;transform:translateX(32px);transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all;}
.slide.exit{opacity:0;transform:translateX(-32px);}
.s-left{width:185px;flex-shrink:0;padding:16px 14px;border-right:1px solid #1e2736;display:flex;flex-direction:column;gap:3px;background:#0d1117;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.logo-icon{width:26px;height:26px;background:#0d2240;border:1px solid rgba(56,217,255,.3);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:14px;font-weight:800;}
.logo-text .w{color:#fff;}
.logo-text .c{color:#38d9ff;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:12px;color:#8b9ab0;}
.nav-item.on{background:#161b22;color:#fff;}
.s-right{flex:1;padding:16px;overflow:hidden;background:#0d1117;}
.stitle{font-size:11px;font-weight:700;color:#c9d1d9;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
#footer{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #1a2030;flex-shrink:0;background:#0d1117;}
#caption{font-size:12px;color:#8b9ab0;max-width:320px;line-height:1.5;}
#caption strong{color:#c9d1d9;}
.actions{display:flex;align-items:center;gap:12px;}
#skip-btn{background:none;border:none;color:#3a4560;font-size:12px;cursor:pointer;font-family:inherit;}
#skip-btn:hover{color:#8b9ab0;}
#next-btn{border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;}
#next-btn:hover{opacity:.85;}
.plano-wrap{background:#111823;border:1px solid #1e2736;border-radius:8px;height:175px;position:relative;overflow:hidden;}
.plano-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(56,217,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(56,217,255,.04) 1px,transparent 1px);background-size:20px 20px;}
.room{position:absolute;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;}
.room span{font-size:10px;color:rgba(255,255,255,.75);}
.room small{font-size:9px;color:rgba(255,255,255,.45);}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.tag{font-size:10px;border-radius:10px;padding:2px 8px;border:1px solid;}
.cards{display:flex;gap:7px;margin-top:7px;}
.card{background:#111823;border:1px solid #1e2736;border-radius:7px;padding:9px 11px;flex:1;}
.card .lbl{font-size:9px;color:#8b9ab0;margin-bottom:3px;}
.card .val{font-size:15px;font-weight:700;}
.prow{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#111823;border:1px solid #1e2736;border-radius:5px;margin-bottom:3px;}
.prow .rn{display:flex;align-items:center;gap:6px;font-size:11px;color:#c9d1d9;}
.prow .dot{width:6px;height:6px;border-radius:50%;}
.prow .rv{font-size:11px;font-weight:700;}
.cbar-wrap{background:#0f1620;border-radius:4px;height:7px;overflow:hidden;margin-top:3px;}
.cbar{height:7px;border-radius:4px;}
.gring{position:absolute;border-radius:50%;border:1px solid rgba(56,217,255,.15);}
</style>
</head>
<body>

<div id="bar"></div>
<div id="body"></div>
<div id="footer">
  <div id="caption"></div>
  <div class="actions">
    <button id="skip-btn">Omitir</button>
    <button id="next-btn">Siguiente →</button>
  </div>
</div>

<script>
const NAV=['Medición','Cómputo','Presupuesto','Plan de trabajo','Certificaciones'];

function mkLeft(active){
  return `<div class="s-left">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 36 36" fill="none">
          <path d="M18 4L30 11V25L18 32L6 25V11L18 4Z" stroke="#38d9ff" stroke-width="2" fill="none"/>
          <path d="M18 4L18 18M18 18L30 11M18 18L6 11" stroke="rgba(56,217,255,.4)" stroke-width="1"/>
        </svg>
      </div>
      <div class="logo-text"><span class="w">LAYER</span><span class="c">IX</span></div>
    </div>
    ${NAV.map((n,i)=>`<div class="nav-item ${i===active?'on':''}">${n}</div>`).join('')}
  </div>`;
}

const slides=[
  {
    nav:0,
    caption:'<strong>Escalá y medí sobre el plano.</strong> Área para pisos, Línea para muros, Punto para columnas. Las capas organizan todo automáticamente.',
    btnBg:'#38d9ff', btnColor:'#0d1117', btnText:'Siguiente →',
    html(){return mkLeft(0)+`
      <div class="s-right">
        <div class="stitle">✏️ Medición</div>
        <div class="plano-wrap">
          <div class="plano-grid"></div>
          <div class="room" style="left:8px;top:8px;width:138px;height:78px;background:rgba(239,68,68,.13);border:1.5px solid rgba(239,68,68,.4);">
            <span>Dormitorio</span><small>18.40 m²</small>
          </div>
          <div class="room" style="left:152px;top:8px;width:95px;height:50px;background:rgba(56,217,255,.1);border:1.5px solid rgba(56,217,255,.35);">
            <span>Baño</span><small>7.20 m²</small>
          </div>
          <div class="room" style="left:152px;top:64px;width:95px;height:75px;background:rgba(139,92,246,.1);border:1.5px solid rgba(139,92,246,.35);">
            <span>Cocina</span><small>11.80 m²</small>
          </div>
          <div class="room" style="left:8px;top:92px;width:138px;height:50px;background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.3);">
            <span>Living</span><small>24.10 m²</small>
          </div>
          <div style="position:absolute;bottom:5px;right:7px;font-size:9px;color:rgba(56,217,255,.7);background:rgba(13,17,23,.8);padding:2px 6px;border-radius:3px;">Escala: 170 px/m ✓</div>
        </div>
        <div class="tags">
          <span class="tag" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#f87171;">● Pisos</span>
          <span class="tag" style="background:rgba(56,217,255,.08);border-color:rgba(56,217,255,.25);color:#38d9ff;">● Mampostería</span>
          <span class="tag" style="background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.25);color:#a78bfa;">● Estructuras</span>
        </div>
        <div class="cards">
          <div class="card"><div class="lbl">Cómputo</div><div class="val" style="color:#38d9ff;">210 m²</div></div>
          <div class="card"><div class="lbl">Objetos</div><div class="val" style="color:#c9d1d9;">14</div></div>
          <div class="card"><div class="lbl">Capas</div><div class="val" style="color:#a78bfa;">4</div></div>
        </div>
      </div>`;}
  },
  {
    nav:2,
    caption:'<strong>Precios del mercado argentino, siempre actualizados.</strong> Editá cada valor, agregá ítems propios e instalaciones.',
    btnBg:'#38d9ff', btnColor:'#0d1117', btnText:'Siguiente →',
    html(){return mkLeft(2)+`
      <div class="s-right">
        <div class="stitle">💰 Presupuesto</div>
        <div class="cards" style="margin-bottom:8px;">
          <div class="card"><div class="lbl">Ítems</div><div class="val" style="color:#38d9ff;">12</div></div>
          <div class="card" style="flex:2;"><div class="lbl">Costo directo</div><div class="val" style="font-size:12px;color:#c9d1d9;">$16.900.764</div></div>
          <div class="card" style="flex:2;"><div class="lbl">Total general</div><div class="val" style="font-size:12px;color:#f59e0b;">$24.729.198</div></div>
        </div>
        ${[['#ef4444','Mampostería','$16.501.388'],['#38d9ff','Estructuras','$4.288.754'],['#4ade80','Revoque','$2.100.000'],['#a78bfa','Cerámicos','$1.240.000'],['#f59e0b','Pintura','$598.622']].map(([c,n,v])=>`
          <div class="prow"><div class="rn"><div class="dot" style="background:${c};"></div>${n}</div><div class="rv" style="color:${c};">${v}</div></div>
        `).join('')}
        <div class="tags" style="margin-top:6px;">
          <span class="tag" style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:#f59e0b;">💡 Precio sugerido</span>
          <span class="tag" style="background:rgba(56,217,255,.08);border-color:rgba(56,217,255,.2);color:#38d9ff;">📊 Excel / PDF</span>
        </div>
      </div>`;}
  },
  {
    nav:3,
    caption:'<strong>Programá los tiempos, visualizá la curva de inversión</strong> y registrá el avance con certificados mensuales.',
    btnBg:'#38d9ff', btnColor:'#0d1117', btnText:'Siguiente →',
    html(){return mkLeft(3)+`
      <div class="s-right">
        <div class="stitle">📋 Plan y Certificaciones</div>
        <div class="card" style="margin-bottom:7px;">
          <div class="lbl" style="text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Curva de avance financiero</div>
          <svg width="100%" height="55" viewBox="0 0 300 55" preserveAspectRatio="none">
            <polyline points="0,50 60,42 120,30 180,16 240,8 300,4" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="0" cy="50" r="3" fill="#1d4ed8"/><circle cx="60" cy="42" r="3" fill="#1d4ed8"/>
            <circle cx="120" cy="30" r="3" fill="#1d4ed8"/><circle cx="180" cy="16" r="3" fill="#1d4ed8"/>
            <circle cx="240" cy="8" r="3" fill="#1d4ed8"/><circle cx="300" cy="4" r="3" fill="#1d4ed8"/>
          </svg>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
            <span style="font-size:10px;color:#8b9ab0;text-transform:uppercase;letter-spacing:.04em;">Certificado N° 1</span>
            <span style="font-size:11px;font-weight:700;color:#f59e0b;">$3.790.726</span>
          </div>
          ${[['Mampostería',62,'#ef4444'],['Estructuras',45,'#38d9ff'],['Revoque',28,'#4ade80']].map(([n,p,c])=>`
            <div style="margin-bottom:5px;">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:#8b9ab0;margin-bottom:2px;"><span>${n}</span><span style="color:${c};">${p}%</span></div>
              <div class="cbar-wrap"><div class="cbar" style="width:${p}%;background:${c};"></div></div>
            </div>
          `).join('')}
          <div class="cards" style="margin-top:7px;">
            <div style="flex:1;background:#0f1620;border:1px solid #1e2736;border-radius:5px;padding:6px;text-align:center;">
              <div style="font-size:9px;color:#8b9ab0;">Avance</div>
              <div style="font-size:14px;font-weight:700;color:#4ade80;">14.76%</div>
            </div>
            <div style="flex:1;background:#0f1620;border:1px solid #1e2736;border-radius:5px;padding:6px;text-align:center;">
              <div style="font-size:9px;color:#8b9ab0;">Saldo</div>
              <div style="font-size:14px;font-weight:700;color:#f59e0b;">$21.8M</div>
            </div>
          </div>
        </div>
      </div>`;}
  },
  {
    nav:-1,
    caption:'<strong style="color:#a78bfa;">Modo colaborativo e IA</strong> — dos funciones que van a cambiar la forma de trabajar en obra. Muy pronto.',
    btnBg:'#a78bfa', btnColor:'#fff', btnText:'Empezar →',
    html(){return `<div style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0d1117;">
      <div class="gring" style="width:480px;height:480px;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
      <div class="gring" style="width:320px;height:320px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(56,217,255,.12);"></div>
      <div class="gring" style="width:180px;height:180px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(56,217,255,.22);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:12px;z-index:10;">
        <div style="width:72px;height:72px;background:#0d1a2a;border:2px solid rgba(56,217,255,.5);border-radius:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="40" height="40" viewBox="0 0 36 36" fill="none">
            <path d="M18 4L30 11V25L18 32L6 25V11L18 4Z" stroke="#38d9ff" stroke-width="1.5" fill="none"/>
            <path d="M18 4L18 18M18 18L30 11M18 18L6 11M18 18L18 32M18 18L30 25M18 18L6 25" stroke="rgba(56,217,255,.4)" stroke-width="1"/>
          </svg>
        </div>
        <div style="font-size:26px;font-weight:800;letter-spacing:-.5px;"><span style="color:#fff;">LAYER</span><span style="color:#38d9ff;">IX</span></div>
        <div style="background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);border-radius:20px;padding:4px 16px;font-size:11px;color:#a78bfa;letter-spacing:.05em;text-transform:uppercase;">Próximamente</div>
      </div>
      <div style="position:absolute;left:24px;top:50%;transform:translateY(-80%);background:#0f1620;border:1px solid #1e2736;border-radius:8px;padding:10px 12px;max-width:140px;">
        <div style="font-size:11px;font-weight:700;color:#38d9ff;margin-bottom:3px;">Modo colaborativo</div>
        <div style="font-size:10px;color:#8b9ab0;line-height:1.4;">Trabajá en equipo en tiempo real</div>
      </div>
      <div style="position:absolute;right:24px;top:50%;transform:translateY(-80%);background:#0f1620;border:1px solid #1e2736;border-radius:8px;padding:10px 12px;max-width:140px;">
        <div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:3px;">IA que cómputa</div>
        <div style="font-size:10px;color:#8b9ab0;line-height:1.4;">Subí el plano, la IA mide todo</div>
      </div>
    </div>`;}
  }
];

let cur=0;
const total=slides.length;

function renderBar(){
  document.getElementById('bar').innerHTML=slides.map((_,i)=>
    `<div class="seg ${i<cur?'past':i===cur?'on':''}"></div>`
  ).join('');
}

function renderSlide(){
  const s=slides[cur];
  const body=document.getElementById('body');
  const old=body.querySelector('.slide.active');
  if(old){old.classList.remove('active');old.classList.add('exit');setTimeout(()=>old.remove(),380);}
  const div=document.createElement('div');
  div.className='slide active';
  div.innerHTML=s.html();
  body.appendChild(div);
  document.getElementById('caption').innerHTML=s.caption;
  const btn=document.getElementById('next-btn');
  btn.textContent=s.btnText;
  btn.style.background=s.btnBg;
  btn.style.color=s.btnColor;
}

function done(){
  window.parent.postMessage('ob-done','*');
}

document.getElementById('next-btn').addEventListener('click',()=>{
  if(cur<total-1){cur++;renderBar();renderSlide();}
  else done();
});
document.getElementById('skip-btn').addEventListener('click',done);

renderBar();
renderSlide();
</script>
</body>
</html>
